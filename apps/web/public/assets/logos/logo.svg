<svg viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Target circles -->
  <circle cx="35" cy="35" r="30" stroke="#2d3748" stroke-width="3"/>
  <circle cx="35" cy="35" r="20" stroke="#2d3748" stroke-width="3"/>
  <circle cx="35" cy="35" r="10" stroke="#2d3748" stroke-width="2"/>

  <!-- Crosshairs -->
  <line x1="35" y1="5" x2="35" y2="15" stroke="#2d3748" stroke-width="2"/>
  <line x1="35" y1="55" x2="35" y2="65" stroke="#2d3748" stroke-width="2"/>
  <line x1="5" y1="35" x2="15" y2="35" stroke="#2d3748" stroke-width="2"/>
  <line x1="55" y1="35" x2="65" y2="35" stroke="#2d3748" stroke-width="2"/>

  <!-- Arrow -->
  <line x1="40" y1="30" x2="60" y2="10" stroke="#2d3748" stroke-width="2"/>
  <line x1="60" y1="10" x2="58" y2="18" stroke="#2d3748" stroke-width="2"/>
  <line x1="60" y1="10" x2="52" y2="12" stroke="#2d3748" stroke-width="2"/>

  <!-- Chevrons (yellow) -->
  <g stroke="#F2E96D" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="50,45 60,55 70,45"/>
    <polyline points="55,55 65,65 75,55"/>
    <polyline points="60,65 70,75 80,65"/>
  </g>

  <!-- Text: ALVO DIÁRIO -->
  <text x="100" y="50" font-family="DM Sans, sans-serif" font-size="32" font-weight="bold" fill="#2d3748">
    ALVO DIÁRIO
  </text>

  <!-- Subtitle -->
  <text x="100" y="70" font-family="DM Sans, sans-serif" font-size="11" fill="#566873" letter-spacing="1">
    DISCIPLINA TÁTICA PARA SUA APROVAÇÃO
